<!DOCTYPE html>
<html>
<head>
  <title>Pro Chat</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    #joinScreen {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    input, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin: 5px;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
    }

    #chatScreen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 10px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 6px;
      padding: 10px;
      background: #1e293b;
      border-radius: 10px;
      max-width: 75%;
      font-size: 14px;
    }

    .me {
      background: #38bdf8;
      color: black;
      margin-left: auto;
    }

    .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 3px;
    }

    img {
      max-width: 200px;
      border-radius: 10px;
      margin-top: 5px;
    }

    footer {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    #typing {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<div id="joinScreen">
  <h2>Enter Room Code</h2>
  <input id="room" placeholder="e.g. 1234" />
  <button onclick="join()">Join</button>
</div>

<div id="chatScreen">
  <header>
    Room: <span id="roomName"></span> |
    Users: <span id="users">1</span>
    <div id="typing"></div>
  </header>

  <div id="chat"></div>

  <footer>
    <input id="msg" placeholder="Message..." oninput="typing()" />
    <input type="file" id="file" />
    <button onclick="sendMsg()">Send</button>
  </footer>
</div>

<script>
let ws, room;
const user = "User-" + Math.floor(Math.random()*9999);

function timeNow() {
  const d = new Date();
  return d.getHours() + ":" + d.getMinutes();
}

function join() {
  room = document.getElementById("room").value;
  if (!room) return alert("Enter room");

  ws = new WebSocket("wss://YOUR-SERVER-URL");

  ws.onopen = () => {
    ws.send(JSON.stringify({type:"join", room, user}));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "message") {
      const div = document.createElement("div");
      div.className = "msg";
      if (data.user === user) div.classList.add("me");

      let content = data.text;

      if (data.file) {
        content += `<br><img src="${data.file}">`;
      }

      div.innerHTML = `<b>${data.user}</b><br>${content}
      <div class="time">${data.time}</div>`;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    if (data.type === "users") {
      users.innerText = data.count;
    }

    if (data.type === "typing") {
      typingBox.innerText = data.user + " typing...";
      setTimeout(()=> typingBox.innerText="", 1000);
    }
  };

  joinScreen.style.display="none";
  chatScreen.style.display="flex";
  roomName.innerText=room;
}

function sendMsg() {
  const input = msg.value;
  const file = document.getElementById("file").files[0];

  if (!input && !file) return;

  if (file) {
    const reader = new FileReader();
    reader.onload = () => {
      ws.send(JSON.stringify({
        type:"message",
        room, user,
        text: input,
        file: reader.result,
        time: timeNow()
      }));
    };
    reader.readAsDataURL(file);
  } else {
    ws.send(JSON.stringify({
      type:"message",
      room, user,
      text: input,
      time: timeNow()
    }));
  }

  msg.value="";
  file.value="";
}

function typing() {
  ws.send(JSON.stringify({type:"typing", room, user}));
}
</script>

</body>
</html>
